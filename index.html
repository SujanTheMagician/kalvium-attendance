<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c10;--surface:#13161d;--surface2:#1a1e28;--surface3:#232838;
  --border:#262b38;--border2:#34394a;--text:#eef0f5;--text2:#9aa1b4;--text3:#5c637a;
  --accent:#6366f1;--accent2:#4f52d9;--accentbg:rgba(99,102,241,0.12);--accentglow:rgba(99,102,241,0.4);
  --green:#22c55e;--greenbg:rgba(34,197,94,0.1);
  --red:#ef4444;--redbg:rgba(239,68,68,0.1);
  --amber:#f59e0b;--amberbg:rgba(245,158,11,0.1);
  --blue:#38bdf8;--bluebg:rgba(56,189,248,0.1);
  --radius:10px;--radius2:16px;--radius3:22px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.55;min-height:100vh;
  background-image:radial-gradient(circle at 15% 0%, rgba(99,102,241,0.08), transparent 40%), radial-gradient(circle at 85% 100%, rgba(56,189,248,0.06), transparent 40%);
  background-attachment:fixed;}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;font-weight:600}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
#app{display:flex;min-height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{width:236px;background:rgba(19,22,29,0.7);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;overflow-x:hidden;min-width:0}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-badge{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#818cf8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;font-family:'Space Grotesk',sans-serif;box-shadow:0 4px 14px var(--accentglow)}
.logo-text{font-size:15px;font-weight:700;color:var(--text);font-family:'Space Grotesk',sans-serif}
.logo-sub{font-size:11px;color:var(--text3);padding-left:1px}
.nav-section{padding:14px 10px}
.nav-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;padding:8px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;cursor:pointer;transition:all .15s;font-size:13.5px;font-weight:500;color:var(--text2);margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accentbg);color:#a5b4fc}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{width:17px;height:17px;flex-shrink:0;opacity:.85}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:17px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.role-pill{display:flex;align-items:center;gap:9px;padding:9px 10px;background:var(--surface2);border-radius:11px;border:1px solid var(--border)}
.role-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.role-avatar img{width:100%;height:100%;object-fit:cover}
.role-name{font-size:12.5px;font-weight:600;color:var(--text)}
.role-tag{font-size:10.5px;color:var(--text3)}
.role-switch{margin-left:auto;background:transparent;border:none;color:var(--text3);cursor:pointer;padding:5px;border-radius:6px;display:flex}
.role-switch:hover{background:var(--surface3);color:var(--red)}

/* ===== PAGE HEADER ===== */
.page-header{padding:30px 32px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-title{font-size:24px;color:var(--text);margin-bottom:4px;font-weight:700;letter-spacing:-0.01em}
.page-sub{font-size:13.5px;color:var(--text2)}
.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--surface3);color:var(--text);border-color:var(--accent)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#7c7ff5);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.btn-primary:hover{box-shadow:0 6px 18px rgba(99,102,241,.45);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-danger{background:var(--redbg);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-success{background:var(--greenbg);border:1px solid rgba(34,197,94,.3);color:#86efac}
.btn-sm{padding:6px 12px;font-size:11.5px}
.content{padding:24px 32px 48px}

/* ===== STAT CARDS ===== */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;position:relative;overflow:hidden;transition:all .2s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.stat-card.blue::before{background:linear-gradient(90deg,var(--blue),#0ea5e9)}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),#16a34a)}
.stat-card.red::before{background:linear-gradient(90deg,var(--red),#dc2626)}
.stat-card.amber::before{background:linear-gradient(90deg,var(--amber),#d97706)}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.stat-icon-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.stat-label{font-size:11.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.stat-value{font-size:30px;font-weight:800;font-family:'Space Grotesk',sans-serif;color:var(--text);letter-spacing:-0.02em}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px}

/* ===== TABLE CARD ===== */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;margin-bottom:20px}
.table-head{padding:17px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.table-title{font-size:15px;font-weight:700;color:var(--text)}
.table-sub{font-size:12px;color:var(--text3);margin-top:2px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:11px 20px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:var(--surface2)}
.data-table td{padding:13px 20px;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text2);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface2)}
.data-table td .name{color:var(--text);font-weight:600}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11.5px;font-weight:600}
.badge-green{background:var(--greenbg);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.badge-red{background:var(--redbg);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.badge-amber{background:var(--amberbg);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.badge-accent{background:var(--accentbg);color:#a5b4fc;border:1px solid rgba(99,102,241,.25)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-amber{background:var(--amber)}

/* ===== PROGRESS ===== */
.progress-wrap{background:var(--surface3);border-radius:99px;height:7px;overflow:hidden;min-width:90px}
.progress-bar{height:100%;border-radius:99px;transition:width .4s ease}
.progress-green{background:linear-gradient(90deg,#16a34a,var(--green))}
.progress-amber{background:linear-gradient(90deg,#d97706,var(--amber))}
.progress-red{background:linear-gradient(90deg,#dc2626,var(--red))}

/* ===== SESSION GRID ===== */
.session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px;padding:18px 20px}
.session-slot{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;transition:all .15s}
.session-slot.marked{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.06)}
.session-slot.absent-marked{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.06)}
.session-time{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600}
.session-name{font-size:13px;font-weight:600;color:var(--text)}
.session-actions{display:flex;gap:7px;margin-top:11px}
.mark-btn{flex:1;padding:6px;border-radius:7px;border:none;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.mark-present{background:var(--greenbg);color:#4ade80}
.mark-present:hover,.mark-present.active{background:var(--green);color:#04130a}
.mark-absent{background:var(--redbg);color:#f87171}
.mark-absent:hover,.mark-absent.active{background:var(--red);color:#1a0505}

/* ===== ALERT CARDS ===== */
.alert-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:16px 18px;margin-bottom:11px;display:flex;align-items:flex-start;gap:13px;transition:all .15s}
.alert-row:hover{border-color:var(--border2)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(5,6,9,.78);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius3);width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700;color:var(--text)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.close-btn{background:var(--surface2);border:none;color:var(--text2);cursor:pointer;font-size:16px;line-height:1;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:var(--surface3);color:var(--text)}

/* ===== FORM ===== */
.form-group{margin-bottom:16px}
.form-label{font-size:12.5px;font-weight:600;color:var(--text2);display:block;margin-bottom:7px}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:10px;padding:10px 13px;color:var(--text);font-size:13.5px;font-family:'Inter',sans-serif;outline:none;transition:border .15s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentbg)}
.form-select{appearance:none;cursor:pointer}
.form-hint{font-size:11.5px;color:var(--text3);margin-top:6px}

/* ===== TABS ===== */
.tabs{display:flex;gap:3px;background:var(--surface2);border-radius:11px;padding:4px;margin-bottom:22px;width:fit-content}
.tab{padding:7px 16px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;font-family:'Inter',sans-serif}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* ===== CARDS GRID ===== */
.cards-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:22px}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;transition:all .15s}
.info-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.assign-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:15px 17px;margin-bottom:11px;display:flex;align-items:flex-start;gap:13px}
.assign-left{flex:1;min-width:0}
.assign-title{font-size:13.5px;font-weight:600;color:var(--text)}
.deadline-urgent{color:#f87171}.deadline-soon{color:#fbbf24}.deadline-ok{color:#4ade80}

/* ===== STUDENT HERO ===== */
.student-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:24px;margin-bottom:22px;display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.student-avatar{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.student-name{font-size:19px;font-weight:700;color:var(--text);margin-bottom:5px}
.student-meta{font-size:12.5px;color:var(--text2);display:flex;gap:15px;flex-wrap:wrap}
.big-pct{font-size:38px;font-weight:800;font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em}

.grid-scroll{overflow-x:auto}
.attendance-matrix{min-width:600px}

/* ===== TOAST ===== */
.toast-container{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{background:var(--surface3);border:1px solid var(--border2);border-radius:11px;padding:11px 16px;font-size:12.5px;color:var(--text);max-width:310px;pointer-events:all;animation:toastIn .25s ease;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
@keyframes toastIn{from{transform:translateX(24px);opacity:0}to{transform:none;opacity:1}}
.scroll-section{max-height:400px;overflow-y:auto}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ===== LOADING ===== */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px;background:var(--bg)}
.loading-spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== LOGIN PAGE (REVAMPED) ===== */
.login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:24px}
.login-glow-1{position:absolute;width:480px;height:480px;background:radial-gradient(circle,rgba(99,102,241,.22),transparent 70%);top:-180px;left:-140px;border-radius:50%;filter:blur(20px)}
.login-glow-2{position:absolute;width:420px;height:420px;background:radial-gradient(circle,rgba(56,189,248,.16),transparent 70%);bottom:-160px;right:-120px;border-radius:50%;filter:blur(20px)}
.login-card{position:relative;background:rgba(19,22,29,.85);backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:26px;padding:44px 40px;text-align:center;max-width:420px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.45)}
.login-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),#818cf8);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin:0 auto 22px;font-family:'Space Grotesk',sans-serif;box-shadow:0 10px 30px var(--accentglow)}
.login-title{font-size:25px;font-weight:800;margin-bottom:8px;letter-spacing:-0.01em}
.login-meta{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12.5px;color:var(--text2);margin-bottom:6px;flex-wrap:wrap}
.login-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--text3)}
.login-desc{font-size:13px;color:var(--text3);margin-bottom:32px}
.login-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:11px;padding:13px 20px;background:#fff;color:#1f2330;border:none;border-radius:13px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,255,255,.15)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-footer-text{font-size:11.5px;color:var(--text3);margin-top:18px}
.login-badges{display:flex;gap:8px;justify-content:center;margin-top:26px;flex-wrap:wrap}
.login-pill{font-size:10.5px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:5px 11px;border-radius:99px}

@media(max-width:900px){.two-col{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.sidebar{width:56px}.logo-text,.nav-item span,.role-name,.role-tag,.logo-sub{display:none}.page-header{padding:20px 16px 0}.content{padding:18px 16px 40px}}
</style>
</head>

<div id="app"></div>
<script type="text/babel" data-presets="react,stage-3">

const { useState, useEffect, useCallback, useRef, memo } = React;

// ── SCHEDULE (this stays static — it's the actual class timetable, not user data) ──
const SCHEDULE = {

  Thu:[{time:"08:30–09:20",subject:"Database Management Systems Theory"},{time:"09:20–10:10",subject:"Database Management Systems Theory"},{time:"10:25–11:15",subject:"Backend Web Development – SPC5"},{time:"11:15–12:05",subject:"Object Oriented Programming"},{time:"13:05–13:55",subject:"Introduction to Artificial Intelligence"},{time:"13:55–14:45",subject:"NPTEL Open Elective"},{time:"14:45–15:30",subject:"Growth Hour"}]
};
const DAYS = ["Mon","Tue","Wed","Thu"];

// ── FIREBASE HELPERS ─────────────────────────────────────────────────────────
const waitForFirebase = () => new Promise(res => {
  const check = () => window.__firebase ? res() : setTimeout(check, 50);
  check();
});

// Mentors collection — fully dynamic, no hardcoding.
// Document ID = lowercased email. { email, name, addedBy, role: "mentor"|"campus_manager", createdAt }
async function fbGetMentors() {
  await waitForFirebase();
  const {collection,getDocs} = window.__firebase;
  const snap = await getDocs(collection(window.__db,"mentors"));
  return snap.docs.map(d=>({...d.data(),id:d.id}));
}
async function fbAddMentor(email, name, role, addedBy) {
  await waitForFirebase();
  const {doc,setDoc,serverTimestamp} = window.__firebase;
  const id = email.trim().toLowerCase();
  await setDoc(doc(window.__db,"mentors",id),{ email:id, name:name||"", role:role||"mentor", addedBy:addedBy||"", createdAt:serverTimestamp() });
}
async function fbRemoveMentor(email) {
  await waitForFirebase();
  const {doc,deleteDoc} = window.__firebase;
  await deleteDoc(doc(window.__db,"mentors",email.trim().toLowerCase()));
}
function fbSubscribeMentors(cb) {
  const go = async()=>{
    await waitForFirebase();
    const {collection,onSnapshot}=window.__firebase;
    return onSnapshot(collection(window.__db,"mentors"),snap=>{cb(snap.docs.map(d=>({...d.data(),id:d.id})));});
  };
  let unsub=()=>{};go().then(u=>{unsub=u;});return ()=>unsub();
}

async function fbSaveStudent(s) {

}
async function fbGetAttendance(studentId) {
  await waitForFirebase();
  const {collection,getDocs} = window.__firebase;

function fbSubscribeAssignments(cb) {

  };
  let unsub=()=>{};go().then(u=>{unsub=u;});return ()=>unsub();
}
function genToken(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let t="";for(let i=0;i<8;i++)t+=c[Math.floor(Math.random()*c.length)];return t;}
async function fbCreateQR(sessionIdx,dayName,date,mins=10){
  await waitForFirebase();
  const {doc,setDoc,serverTimestamp}=window.__firebase;
  const token=genToken();
  await setDoc(doc(window.__db,"qrTokens",token),{token,sessionIdx,dayName,date,expiresAt:new Date(Date.now()+mins*60000).toISOString(),scans:[],createdAt:serverTimestamp()});
  return token;
}
async function fbValidateQR(token,studentId){
  await waitForFirebase();
  const {doc,getDoc,updateDoc}=window.__firebase;
  const snap=await getDoc(doc(window.__db,"qrTokens",token));
  if(!snap.exists()) return{valid:false,reason:"Invalid QR code"};
  const d=snap.data();
  if(new Date(d.expiresAt)<new Date()) return{valid:false,reason:"QR code expired"};
  if(d.scans.includes(studentId)) return{valid:false,reason:"Already marked present"};
  await fbSaveAttendance(studentId,d.date,{[d.sessionIdx]:"P"});
  await updateDoc(doc(window.__db,"qrTokens",token),{scans:[...d.scans,studentId]});
  return{valid:true,session:SCHEDULE[d.dayName]?.[d.sessionIdx]?.subject,date:d.date};
}

// ── UTILITIES ────────────────────────────────────────────────────────────────
function initials(n){return (n||"?").split(" ").slice(0,2).map(x=>x[0]).join("").toUpperCase();}
function calcPct(records){
  let t=0,p=0;
  Object.values(records||{}).forEach(day=>{Object.entries(day).forEach(([k,v])=>{if(k==="savedAt")return;t++;if(v==="P"||v==="L")p++;});});
  return t===0?100:Math.round(p/t*100);
}
function daysUntil(d){return Math.ceil((new Date(d)-new Date())/(86400000));}
function dueDateLabel(d){
  if(d<0)return{label:`${Math.abs(d)}d overdue`,cls:"deadline-urgent"};
  if(d===0)return{label:"Due today!",cls:"deadline-urgent"};
  if(d===1)return{label:"Due tomorrow",cls:"deadline-urgent"};
  if(d<=3)return{label:`Due in ${d} days`,cls:"deadline-soon"};
  return{label:`Due in ${d} days`,cls:"deadline-ok"};
}

    [...new Set(Object.values(SCHEDULE).flat().map(s=>s.subject))].forEach(sub=>{

    const total=Object.keys(records).length*7,attended=Math.round(total*pct/100);
    [[`Total sessions`,String(total)],[`Sessions attended`,String(attended)],[`Sessions missed`,String(total-attended)],[`Attendance %`,`${pct}%`],[`Status`,pct>=75?"ELIGIBLE ✓":"BELOW THRESHOLD ⚠"]].forEach(([l,v])=>{

// ── QR PAGE ───────────────────────────────────────────────────────────────────
function QRPage({students,role,currentStudentId,addToast}){
  const [selDay,setSelDay]=useState(TODAY_KEY);
  const [selIdx,setSelIdx]=useState(0);
  const [token,setToken]=useState(null);
  const [timeLeft,setTimeLeft]=useState(0);
  const [scans,setScans]=useState([]);
  const [fullscreen,setFullscreen]=useState(false);
  const [manualToken,setManualToken]=useState("");
  const [scanStatus,setScanStatus]=useState(null);
  const [generating,setGenerating]=useState(false);
  const timerRef=useRef();const pollRef=useRef();
  const DURATION=10*60;
  const sessions=SCHEDULE[selDay]||[];
  const generate=async()=>{
    setGenerating(true);
    try{
      const t=await fbCreateQR(selIdx,selDay,TODAY_DATE,10);
      setToken(t);setTimeLeft(DURATION);setScans([]);
      clearInterval(timerRef.current);
      timerRef.current=setInterval(()=>setTimeLeft(x=>{if(x<=1){clearInterval(timerRef.current);setToken(null);return 0;}return x-1;}),1000);
      clearInterval(pollRef.current);
      pollRef.current=setInterval(async()=>{
        await waitForFirebase();const {doc,getDoc}=window.__firebase;
        const snap=await getDoc(doc(window.__db,"qrTokens",t));
        if(snap.exists()){const s=snap.data().scans||[];setScans(s.map(id=>{const st=students.find(x=>x.id===id);return st?st.name.split(" ")[0]:id;}));}
      },3000);
      addToast("QR generated — 10 min window","🔲");
    }catch(e){addToast("Failed: "+e.message,"❌");}
    setGenerating(false);
  };
  const validate=async()=>{
    if(!manualToken.trim()||!currentStudentId){addToast("Enter a code","⚠️");return;}
    setScanStatus("loading");
    const r=await fbValidateQR(manualToken.trim().toUpperCase(),currentStudentId);
    setScanStatus(r.valid?"success":"error");
    addToast(r.valid?`✅ Marked present for ${r.session}`:`❌ ${r.reason}`,r.valid?"✅":"❌");
  };
  useEffect(()=>()=>{clearInterval(timerRef.current);clearInterval(pollRef.current);},[]);
  const mins=Math.floor(timeLeft/60),secs=timeLeft%60,prog=(timeLeft/DURATION)*100;

  if(role==="student") return(
    <div style={{padding:"30px 32px"}}>
      <h2 className="page-title" style={{marginBottom:4}}>Scan QR</h2>
      <p className="page-sub" style={{marginBottom:24}}>Enter the 8-character code from your mentor's screen</p>
      <div style={{maxWidth:380}}>
        <div className="table-card" style={{padding:24}}>
          {scanStatus==="success"&&<div style={{background:"var(--greenbg)",border:"1px solid rgba(34,197,94,.2)",borderRadius:10,padding:16,marginBottom:16,textAlign:"center"}}><div style={{fontSize:32,marginBottom:6}}>✅</div><div style={{color:"#4ade80",fontWeight:600}}>Attendance marked!</div></div>}
          {scanStatus==="error"&&<div style={{background:"var(--redbg)",border:"1px solid rgba(239,68,68,.2)",borderRadius:10,padding:12,marginBottom:16}}><div style={{color:"#f87171",fontSize:13}}>Invalid or expired code</div></div>}
          <div className="form-group">
            <label className="form-label">Session code</label>
            <input className="form-input" placeholder="K7X2M9QR" maxLength={8} value={manualToken} onChange={e=>setManualToken(e.target.value.toUpperCase())}
              style={{fontSize:20,fontWeight:700,letterSpacing:"0.2em",textAlign:"center"}} onKeyDown={e=>e.key==="Enter"&&validate()}/>
          </div>
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={validate} disabled={scanStatus==="loading"}>
            {scanStatus==="loading"?"Checking…":"Mark present"}
          </button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{padding:"30px 32px"}}>
      <h2 className="page-title" style={{marginBottom:4}}>QR attendance</h2>
      <p className="page-sub" style={{marginBottom:24}}>Generate a QR — students enter the code to mark present</p>
      <div className="table-card" style={{marginBottom:20}}>
        <div className="table-head"><div className="table-title">Select session</div></div>
        <div style={{padding:"14px 20px"}}>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {DAYS.map(d=><button key={d} onClick={()=>{setSelDay(d);setSelIdx(0);}} style={{padding:"7px 15px",borderRadius:9,border:"1px solid",borderColor:selDay===d?"var(--accent)":"var(--border)",background:selDay===d?"var(--accentbg)":"var(--surface2)",color:selDay===d?"#a5b4fc":"var(--text2)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>{d}</button>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:9,marginBottom:16}}>
            {sessions.map((s,i)=><div key={i} onClick={()=>setSelIdx(i)} style={{padding:"11px 14px",borderRadius:11,cursor:"pointer",border:`1.5px solid ${selIdx===i?"var(--accent)":"var(--border)"}`,background:selIdx===i?"var(--accentbg)":"var(--surface2)"}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:3,fontWeight:600}}>{s.time}</div>
              <div style={{fontSize:12.5,fontWeight:600,color:selIdx===i?"#a5b4fc":"var(--text)"}}>{s.subject.length>30?s.subject.slice(0,28)+"…":s.subject}</div>
            </div>)}
          </div>
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={generate} disabled={generating}>
            {generating?"Generating…":token?"↻ New QR (reset 10 min)":"Generate QR code"}
          </button>
        </div>
      </div>
      {token&&(
        <div className="table-card">
          <div className="table-head">
            <div><div className="table-title">{sessions[selIdx]?.subject}</div><div className="table-sub">{selDay} · {TODAY_DATE}</div></div>
            <span className="badge badge-green">{scans.length} scanned</span>
          </div>
          <div style={{padding:24,textAlign:"center"}}>
            <div style={{background:"#fff",padding:18,borderRadius:14,display:"inline-block",cursor:"pointer",marginBottom:14}} onClick={()=>setFullscreen(true)}>
              <svg width={180} height={180} viewBox="0 0 180 180">

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [role,setRole]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [page,setPage]=useState("dashboard");
  const [students,setStudents]=useState([]);
  const [attendance,setAttendance]=useState({});
  const [assignments,setAssignments]=useState([]);
  const [mentors,setMentors]=useState([]);
  const [dataLoading,setDataLoading]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);
  const [todayMarks,setTodayMarks]=useState({});
  const [activeStudentId,setActiveStudentId]=useState(null);
  const [addStudentForm,setAddStudentForm]=useState({name:"",email:"",parent:""});
  const [addAssignForm,setAddAssignForm]=useState({title:"",subject:SCHEDULE.Mon[0].subject,due:"",type:"Assignment"});
  const [loginLoading,setLoginLoading]=useState(false);

  const addToast=useCallback((msg,icon="✓")=>{
    const id=Date.now()+Math.random();setToasts(t=>[...t,{id,msg,icon}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);

  // Auth listener
  useEffect(()=>{
    const go=async()=>{
      await waitForFirebase();
      const {onAuthStateChanged}=window.__firebase;
      return onAuthStateChanged(window.__auth,u=>{ setUser(u); setAuthLoading(false); });
    };
    let unsub=()=>{};go().then(u=>{unsub=u;});return()=>unsub();
  },[]);

  // Mentors subscription — always on once Firebase ready, regardless of login,
  // so the very first signed-in user can be auto-granted mentor if list is empty.
  useEffect(()=>{
    const unsub=fbSubscribeMentors(setMentors);
    return unsub;
  },[]);

  // Determine role dynamically: mentor if email is in the mentors collection,
  // OR if mentors collection is completely empty (first-ever sign-in bootstraps as mentor).
  useEffect(()=>{
    if(!user){ setRole(null); return; }
    const email=(user.email||"").toLowerCase();
    const isListedMentor = mentors.some(m=>m.id===email);
    if (isListedMentor) { setRole("mentor"); return; }
    if (mentors.length===0) {
      // Bootstrap: first person ever to sign in becomes the founding mentor automatically.
      fbAddMentor(email, user.displayName||"", "mentor", "self-bootstrap");
      setRole("mentor");
      return;
    }
    setRole("student");
  },[user, mentors]);

  // Data subscriptions when logged in
  useEffect(()=>{
    if(!user)return;
    setDataLoading(true);
    const unsubS=fbSubscribeStudents(async ns=>{
      setStudents(ns);
      const a={};await Promise.all(ns.map(async s=>{a[s.id]=await fbGetAttendance(s.id);}));
      setAttendance(a);setDataLoading(false);
    });
    const unsubA=fbSubscribeAssignments(setAssignments);
    return()=>{unsubS();unsubA();};
  },[user]);

  const handleLogin=async()=>{
    setLoginLoading(true);
    try{
      await waitForFirebase();
      const {signInWithPopup}=window.__firebase;
      await signInWithPopup(window.__auth,window.__provider);
    }catch(e){addToast("Sign in failed: "+e.message,"❌");}
    setLoginLoading(false);
  };
  const handleSignOut=async()=>{
    await waitForFirebase();const {signOut}=window.__firebase;
    await signOut(window.__auth);setUser(null);setRole(null);setPage("dashboard");
  };

  const handleAddMentor=async(email,name,mrole)=>{
    try{ await fbAddMentor(email,name,mrole,user?.email||""); addToast(`${email} added to team ✓`,"👤"); }
    catch(e){ addToast("Failed: "+e.message,"❌"); }
  };
  const handleRemoveMentor=async(email)=>{
    try{ await fbRemoveMentor(email); addToast("Removed from team","🗑️"); }
    catch(e){ addToast("Failed: "+e.message,"❌"); }
  };

  const pcts={};students.forEach(s=>{pcts[s.id]=calcPct(attendance[s.id]||{});});
  const dangerStudents=students.filter(s=>pcts[s.id]<75);
  const warningStudents=students.filter(s=>pcts[s.id]>=75&&pcts[s.id]<80);
  const todaySessions=SCHEDULE[TODAY_KEY]||[];
  const myStudent=user?students.find(s=>s.email===user.email):null;

  const handleSaveAttendance=async(sid)=>{
    if(!Object.keys(todayMarks).length){addToast("Nothing to save","⚠️");return;}
    try{await fbSaveAttendance(sid,TODAY_DATE,todayMarks);const u=await fbGetAttendance(sid);setAttendance(p=>({...p,[sid]:u}));addToast("Saved ✓","📋");setTodayMarks({});}
    catch(e){addToast("Save failed: "+e.message,"❌");}
  };
  const handleAddStudent=async()=>{
    const {name,email,parent}=addStudentForm;
    if(!name||!email){addToast("Fill name and email","⚠️");return;}
    const id="KV"+String(students.length+1).padStart(3,"0"),color=COLORS[students.length%COLORS.length];
    try{await fbSaveStudent({id,name,email,parent,squad:"Squad 92",color});addToast(`${name} added ✓`,"👤");setModal(null);setAddStudentForm({name:"",email:"",parent:""});}
    catch(e){addToast("Failed: "+e.message,"❌");}
  };
  const handleAddAssignment=async()=>{
    const {title,subject,due,type}=addAssignForm;
    if(!title||!due){addToast("Fill title and due date","⚠️");return;}
    try{await fbSaveAssignment({title,subject,due,type,status:"pending"});addToast(`"${title}" added ✓`,"📝");setModal(null);setAddAssignForm({title:"",subject:SCHEDULE.Mon[0].subject,due:"",type:"Assignment"});}
    catch(e){addToast("Failed: "+e.message,"❌");}
  };
  const sendWA=(s)=>addToast(`WhatsApp → ${s.parent||"no number"} (connect Twilio for real alerts)`,"📱");

  const MarkAttendance=()=>(
    <>
      <div className="page-header">
        <div><h2 className="page-title">Mark attendance</h2><p className="page-sub">{new Date().toDateString()} · {todaySessions.length} sessions</p></div>
        <button className="btn btn-ghost" onClick={()=>setPage("dashboard")}>← Back</button>
      </div>
      <div className="content">
        <div className="table-card" style={{marginBottom:18}}>
          <div className="table-head"><div className="table-title">Select student</div></div>
          <div style={{padding:"14px 20px",display:"flex",gap:9,flexWrap:"wrap"}}>
            {students.map(s=><div key={s.id} onClick={()=>{setActiveStudentId(s.id);setTodayMarks({});}}
              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderRadius:10,border:`1.5px solid ${activeStudentId===s.id?s.color:"var(--border)"}`,background:activeStudentId===s.id?s.color+"22":"var(--surface2)",cursor:"pointer"}}>
              <div style={{width:23,height:23,borderRadius:"50%",background:s.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9.5,fontWeight:700,color:"#fff"}}>{initials(s.name)}</div>
              <span style={{fontSize:12.5,fontWeight:600}}>{s.name.split(" ")[0]}</span>
            </div>)}
          </div>
        </div>
        {activeStudentId&&(
          <div className="table-card">
            <div className="table-head">
              <div><div className="table-title">{students.find(s=>s.id===activeStudentId)?.name}</div><div className="table-sub">Today · {TODAY_KEY}</div></div>
              <button className="btn btn-success" onClick={()=>handleSaveAttendance(activeStudentId)}>💾 Save to Firebase</button>
            </div>
            <div className="session-grid">
              {todaySessions.map((sess,i)=>{const m=todayMarks[i];return(
                <div key={i} className={`session-slot ${m==="P"?"marked":m==="A"?"absent-marked":""}`}>
                  <div className="session-time">{sess.time}</div>
                  <div className="session-name">{sess.subject}</div>
                  <div className="session-actions">
                    <button className={`mark-btn mark-present ${m==="P"?"active":""}`} onClick={()=>setTodayMarks(x=>({...x,[i]:x[i]==="P"?null:"P"}))}>P Present</button>
                    <button className={`mark-btn mark-absent ${m==="A"?"active":""}`} onClick={()=>setTodayMarks(x=>({...x,[i]:x[i]==="A"?null:"A"}))}>A Absent</button>
                  </div>
                </div>
              );})}
            </div>
          </div>
        )}
      </div>
    </>
  );

  const StudentDetail=()=>{
    const s=students.find(x=>x.id===activeStudentId)||students[0];if(!s)return null;
    const pct=pcts[s.id],rec=attendance[s.id]||{};
    return<>
      <div className="page-header">
        <div><div style={{fontSize:12,color:"var(--text3)",cursor:"pointer",marginBottom:6,fontWeight:600}} onClick={()=>setPage("students")}>← Back</div><h2 className="page-title">{s.name}</h2><p className="page-sub">{s.id}</p></div>
        <div className="header-actions">
          <button className="btn btn-ghost" onClick={()=>sendWA(s)}><Icon name="send" size={13}/>Alert parent</button>
          <button className="btn btn-primary" onClick={()=>generatePDF(s,rec,assignments)}><Icon name="download" size={13}/>PDF</button>
        </div>
      </div>
      <div className="content">
        <div className="student-hero">
          <div className="student-avatar" style={{background:s.color}}>{initials(s.name)}</div>
          <div style={{flex:1}}><div className="student-name">{s.name}</div><div className="student-meta"><span>📧 {s.email}</span><span>📱 {s.parent}</span></div></div>
          <div style={{textAlign:"center"}}>
            <div className="big-pct" style={{color:pct>=75?"#4ade80":pct>=60?"#fbbf24":"#f87171"}}>{pct}%</div>
            <div style={{fontSize:12,color:"var(--text3)"}}>overall</div>
            {pct<75&&<span className="badge badge-red" style={{marginTop:8}}>⚠ Below 75%</span>}
          </div>
        </div>
        <div className="stats-row">
          {[{label:"Days recorded",value:Object.keys(rec).length,color:"blue"},{label:"Attendance %",value:`${pct}%`,color:pct>=75?"green":"red"}].map((c,i)=>(
            <div key={i} className={`stat-card ${c.color}`}><div className="stat-label">{c.label}</div><div className="stat-value" style={{fontSize:22}}>{c.value}</div></div>
          ))}
        </div>
        {Object.keys(rec).length>0&&(
          <div className="table-card">
            <div className="table-head"><div className="table-title">Session records</div></div>
            <div className="grid-scroll">
              <table className="data-table">
                <thead><tr><th>Date</th>{(SCHEDULE[TODAY_KEY]||[]).map((_,i)=><th key={i}>S{i+1}</th>)}</tr></thead>
                <tbody>{Object.entries(rec).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14).map(([date,dayRec])=>(
                  <tr key={date}><td style={{fontSize:12}}>{date}</td>
                  {(SCHEDULE[TODAY_KEY]||[]).map((_,i)=>{const v=dayRec[i];return<td key={i}>
                    {v==="P"?<span className="badge badge-green">P</span>:v==="A"?<span className="badge badge-red">A</span>:<span style={{color:"var(--text3)"}}>—</span>}
                  </td>;})}
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </>;
  };

  const StudentsPage=()=>(
    <>
      <div className="page-header">
        <div><h2 className="page-title">Students</h2><p className="page-sub">Squad 92 · {students.length} enrolled</p></div>
        {role!=="student"&&<button className="btn btn-primary" onClick={()=>setModal("addStudent")}><Icon name="plus" size={13}/>Add student</button>}
      </div>
      <div className="content">
        {students.length===0?<div style={{textAlign:"center",padding:70,color:"var(--text3)"}}>No students yet. Add your first student!</div>:
        <div className="cards-row">{students.map(s=>{const pct=pcts[s.id];return(
          <div key={s.id} className="info-card" style={{cursor:"pointer"}} onClick={()=>{setActiveStudentId(s.id);setPage("studentDetail");}}>
            <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:13}}>
              <div style={{width:42,height:42,borderRadius:11,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,color:"#fff"}}>{initials(s.name)}</div>
              <div style={{flex:1}}><div style={{fontWeight:700,color:"var(--text)",fontSize:13.5}}>{s.name}</div><div style={{fontSize:11,color:"var(--text3)"}}>{s.id}</div></div>
              {pct>=80?<span className="badge badge-green">{pct}%</span>:pct>=75?<span className="badge badge-amber">{pct}%</span>:<span className="badge badge-red">{pct}%</span>}
            </div>
            <div className="progress-wrap" style={{marginBottom:9}}><div className="progress-bar" style={{width:`${pct}%`,background:pct>=80?"var(--green)":pct>=75?"var(--amber)":"var(--red)"}}/></div>
            <div style={{fontSize:11.5,color:"var(--text3)",marginBottom:2}}>{s.email}</div>
            <div style={{fontSize:11.5,color:"var(--text3)"}}>Parent: {s.parent||"—"}</div>
            <div style={{display:"flex",gap:7,marginTop:14}}>
              <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={e=>{e.stopPropagation();generatePDF(s,attendance[s.id]||{},assignments);}}><Icon name="download" size={11}/>PDF</button>
              <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={e=>{e.stopPropagation();sendWA(s);}}><Icon name="send" size={11}/>WA</button>
            </div>
          </div>
        );})}
        </div>}
      </div>
    </>
  );

  const AssignmentsPage=()=>(
    <>
      <div className="page-header">
        <div><h2 className="page-title">Assignments</h2><p className="page-sub">Squad 92 deadlines</p></div>
        {role!=="student"&&<button className="btn btn-primary" onClick={()=>setModal("addAssign")}><Icon name="plus" size={13}/>Add</button>}
      </div>
      <div className="content">
        <div className="stats-row" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
          <div className="stat-card red"><div className="stat-label">Overdue</div><div className="stat-value" style={{color:"#f87171"}}>{assignments.filter(a=>daysUntil(a.due)<0).length}</div></div>
          <div className="stat-card amber"><div className="stat-label">This week</div><div className="stat-value" style={{color:"#fbbf24"}}>{assignments.filter(a=>daysUntil(a.due)>=0&&daysUntil(a.due)<=7).length}</div></div>
          <div className="stat-card green"><div className="stat-label">Upcoming</div><div className="stat-value" style={{color:"#4ade80"}}>{assignments.filter(a=>daysUntil(a.due)>7).length}</div></div>
        </div>
        <div className="table-card">
          <div className="table-head"><div className="table-title">All assignments — live from Firebase</div></div>
          {assignments.length===0?<div style={{padding:28,textAlign:"center",color:"var(--text3)"}}>No assignments yet</div>:
          <table className="data-table">
            <thead><tr><th>Title</th><th>Subject</th><th>Type</th><th>Due</th><th>Status</th></tr></thead>
            <tbody>{[...assignments].sort((a,b)=>new Date(a.due)-new Date(b.due)).map(a=>{const d=daysUntil(a.due),dl=dueDateLabel(d);return(
              <tr key={a.id}><td className="name">{a.title}</td><td style={{fontSize:12.5}}>{a.subject.length>35?a.subject.slice(0,33)+"…":a.subject}</td>
              <td><span className="badge badge-accent">{a.type}</span></td><td>{a.due}</td>
              <td><span className={dl.cls} style={{fontSize:12,fontWeight:600}}>{dl.label}</span></td></tr>
            );})}
            </tbody>
          </table>}
        </div>
      </div>
    </>
  );

  const ReportsPage=()=>(
    <>
      <div className="page-header">
        <div><h2 className="page-title">PDF Reports</h2><p className="page-sub">Monthly report cards</p></div>
        {role!=="student"&&students.length>0&&<button className="btn btn-primary" onClick={()=>students.forEach(s=>generatePDF(s,attendance[s.id]||{},assignments))}><Icon name="download" size={13}/>Export all</button>}
      </div>
      <div className="content">
        {students.length===0?<div style={{textAlign:"center",padding:50,color:"var(--text3)"}}>Add students first</div>:
        <div className="cards-row">{students.map(s=>{const pct=pcts[s.id];return(
          <div key={s.id} className="info-card">
            <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:13}}>
              <div style={{width:38,height:38,borderRadius:9,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13.5,fontWeight:700,color:"#fff"}}>{initials(s.name)}</div>
              <div><div style={{fontWeight:700,fontSize:13.5,color:"var(--text)"}}>{s.name}</div><div style={{fontSize:11,color:"var(--text3)"}}>{s.id}</div></div>
              <div style={{marginLeft:"auto"}}>{pct>=75?<span className="badge badge-green">Eligible</span>:<span className="badge badge-red">At risk</span>}</div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,color:"var(--text2)",marginBottom:7}}><span>Attendance</span><span style={{fontWeight:700,color:pct>=75?"#4ade80":"#f87171"}}>{pct}%</span></div>
            <div className="progress-wrap" style={{marginBottom:13}}><div className="progress-bar" style={{width:`${pct}%`,background:pct>=75?"var(--green)":"var(--red)"}}/></div>
            <div style={{display:"flex",gap:7}}>
              <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>generatePDF(s,attendance[s.id]||{},assignments)}><Icon name="download" size={11}/>Download PDF</button>
              <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>sendWA(s)}><Icon name="send" size={11}/>Send WA</button>
            </div>
          </div>
        );})}
        </div>}
      </div>
    </>
  );

  const AlertsPage=()=>{
    const all=[
      ...dangerStudents.map(s=>({type:"danger",title:`${s.name} at ${pcts[s.id]}% — below 75%`,msg:`Parent: ${s.parent||"no number"} · ${s.email}`,student:s})),
      ...warningStudents.map(s=>({type:"warning",title:`${s.name} at ${pcts[s.id]}% — warning zone`,msg:"Approaching 75% threshold",student:s})),
      ...assignments.filter(a=>daysUntil(a.due)<=2&&daysUntil(a.due)>=0).map(a=>({type:"info",title:`"${a.title}" due ${daysUntil(a.due)===0?"today":"tomorrow"}`,msg:a.subject})),
    ];
    return<>
      <div className="page-header">
        <div><h2 className="page-title">Alerts</h2><p className="page-sub">{all.length} active</p></div>
        {dangerStudents.length>0&&<button className="btn btn-primary" onClick={()=>{dangerStudents.forEach(sendWA);addToast("Alerts sent","📱");}}><Icon name="send" size={13}/>Alert all parents</button>}
      </div>
      <div className="content">
        {all.length===0?<div style={{textAlign:"center",padding:70}}><div style={{fontSize:44,marginBottom:10}}>🎉</div><p style={{color:"var(--text2)"}}>No alerts. All good!</p></div>:
        all.map((a,i)=><div key={i} className="alert-row" style={{borderLeft:`3px solid ${a.type==="danger"?"var(--red)":a.type==="warning"?"var(--amber)":"var(--accent)"}`}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:a.type==="danger"?"var(--red)":a.type==="warning"?"var(--amber)":"var(--accent)",flexShrink:0,marginTop:5}}/>
          <div style={{flex:1}}><div style={{fontSize:13.5,fontWeight:600,color:"var(--text)"}}>{a.title}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:3}}>{a.msg}</div></div>
          {a.student&&<div style={{display:"flex",gap:5}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>sendWA(a.student)}><Icon name="send" size={11}/>WA</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>generatePDF(a.student,attendance[a.student.id]||{},assignments)}><Icon name="download" size={11}/>PDF</button>
          </div>}
        </div>)}
      </div>
    </>;
  };

  const subjects=[...new Set(Object.values(SCHEDULE).flat().map(s=>s.subject))];
  const mentorNav=[{key:"dashboard",label:"Dashboard",icon:"dashboard"},{key:"mark",label:"Mark attendance",icon:"mark"},{key:"students",label:"Students",icon:"students"},{key:"alerts",label:"Alerts",icon:"alerts",badge:dangerStudents.length},{key:"assignments",label:"Assignments",icon:"assign",badge:assignments.filter(a=>daysUntil(a.due)<=2&&daysUntil(a.due)>=0).length},{key:"reports",label:"PDF Reports",icon:"report"},{key:"qr",label:"QR Attendance",icon:"qr"},{key:"team",label:"Team access",icon:"team"}];
  const studentNav=[{key:"dashboard",label:"My overview",icon:"dashboard"},{key:"assignments",label:"Deadlines",icon:"assign"},{key:"qr",label:"Scan QR",icon:"qr"}];
  const nav=role==="mentor"?mentorNav:studentNav;

  const renderPage=()=>{
    if(page==="dashboard")return<Dashboard role={role} students={students} attendance={attendance} assignments={assignments} pcts={pcts} dangerStudents={dangerStudents} warningStudents={warningStudents} setModal={setModal} setPage={setPage} sendWA={sendWA} setActiveStudentId={setActiveStudentId} dataLoading={dataLoading}/>;
    if(page==="mark")return<MarkAttendance/>;
    if(page==="students")return<StudentsPage/>;
    if(page==="studentDetail")return<StudentDetail/>;
    if(page==="alerts")return<AlertsPage/>;
    if(page==="assignments")return<AssignmentsPage/>;
    if(page==="reports")return<ReportsPage/>;
    if(page==="team")return<TeamPage mentors={mentors} currentUserEmail={user?.email} onAdd={handleAddMentor} onRemove={handleRemoveMentor} addToast={addToast}/>;
    if(page==="qr")return<QRPage students={students} role={role} currentStudentId={myStudent?.id} addToast={addToast}/>;
    return null;
  };

  if(authLoading)return<div className="loading-screen"><div className="loading-spinner"/><div style={{color:"var(--text2)",fontSize:13}}>Loading…</div></div>;
  if(!user)return<LoginScreen onLogin={handleLogin} loading={loginLoading}/>;
  if(role===null)return<div className="loading-screen"><div className="loading-spinner"/><div style={{color:"var(--text2)",fontSize:13}}>Setting up your access…</div></div>;

  return(
    <div id="app" style={{display:"flex",minHeight:"100vh"}}>
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-badge"><div className="logo-icon">K</div><div><div className="logo-text">Kalvium</div></div></div>
          <div className="logo-sub">Attendance · Squad 92</div>
        </div>
        <div className="nav-section">
          <div className="nav-label">Navigation</div>
          {nav.map(item=>(
            <div key={item.key} className={`nav-item ${page===item.key||page==="studentDetail"&&item.key==="students"?"active":""}`} onClick={()=>setPage(item.key)}>
              <span className="nav-icon"><Icon name={item.icon} size={15}/></span>
              <span>{item.label}</span>
              {item.badge>0&&<span className="nav-badge">{item.badge}</span>}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="role-pill">
            <div className="role-avatar" style={{background:role==="mentor"?"var(--accent)":"var(--green)"}}>
              {user.photoURL?<img src={user.photoURL} alt=""/>:initials(user.displayName)}
            </div>
            <div><div className="role-name">{user.displayName?.split(" ")[0]}</div><div className="role-tag">{role==="mentor"?"Mentor · Admin":"Student"}</div></div>
            <button className="role-switch" onClick={handleSignOut} title="Sign out"><Icon name="logout" size={14}/></button>
          </div>
        </div>
      </div>
      <div className="main">{renderPage()}</div>
      {modal==="addStudent"&&<AddStudentModal form={addStudentForm} setForm={setAddStudentForm} onClose={()=>setModal(null)} onSubmit={handleAddStudent}/>}
      {modal==="addAssign"&&<AddAssignModal form={addAssignForm} setForm={setAddAssignForm} onClose={()=>setModal(null)} onSubmit={handleAddAssignment} subjects={subjects}/>}
      <Toasts toasts={toasts}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
