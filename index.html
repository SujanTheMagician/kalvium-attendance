<script type="text/babel">
  
const { useState, useEffect, useCallback, useRef } = React;

const MENTOR_EMAILS = ["sujan.anandh.s93@kalvium.community"];
const COLORS = ["#6366f1","#ec4899","#14b8a6","#f59e0b","#22c55e","#f97316","#38bdf8","#a78bfa","#84cc16","#fb7185","#34d399","#fbbf24"];
const SCHEDULE = {
  Mon:[{time:"08:30–09:20",subject:"Object Oriented Programming"},{time:"09:20–10:10",subject:"Backend Web Development – SPC5"},{time:"10:25–11:15",subject:"Introduction to Artificial Intelligence"},{time:"11:15–12:05",subject:"NPTEL Open Elective"},{time:"13:05–13:55",subject:"Data Structures and Algorithms – 1"},{time:"13:55–14:45",subject:"Database Management Systems Theory"},{time:"14:45–15:30",subject:"Growth Hour"}],
  Tue:[{time:"08:30–09:20",subject:"Career Planning & Resume Building"},{time:"09:20–10:10",subject:"Data Structures and Algorithms – 1"},{time:"10:25–11:15",subject:"Data Structures and Algorithms – 1"},{time:"11:15–12:05",subject:"Backend Web Development – SPC5"},{time:"13:05–13:55",subject:"Object Oriented Programming"},{time:"13:55–14:45",subject:"Introduction to Artificial Intelligence"},{time:"14:45–15:30",subject:"Growth Hour"}],
  Wed:[{time:"08:30–09:20",subject:"Data Structures and Algorithms – 1"},{time:"09:20–10:10",subject:"Data Structures and Algorithms – 1"},{time:"10:25–11:15",subject:"Backend Web Development – SPC5"},{time:"11:15–12:05",subject:"Object Oriented Programming"},{time:"13:05–13:55",subject:"Introduction to Artificial Intelligence"},{time:"13:55–14:45",subject:"NPTEL Open Elective"},{time:"14:45–15:30",subject:"Growth Hour"}],
  Thu:[{time:"08:30–09:20",subject:"Database Management Systems Theory"},{time:"09:20–10:10",subject:"Database Management Systems Theory"},{time:"10:25–11:15",subject:"Backend Web Development – SPC5"},{time:"11:15–12:05",subject:"Object Oriented Programming"},{time:"13:05–13:55",subject:"Introduction to Artificial Intelligence"},{time:"13:55–14:45",subject:"NPTEL Open Elective"},{time:"14:45–15:30",subject:"Growth Hour"}]
};
const DAYS = ["Mon","Tue","Wed","Thu"];
const TODAY = new Date();
const TODAY_KEY = DAYS[TODAY.getDay()-1]||"Mon";
const TODAY_DATE = TODAY.toISOString().slice(0,10);

const waitForFirebase = () => new Promise(res => {
  const check = () => window.__firebase ? res() : setTimeout(check, 50);
  check();
});

async function fbSaveStudent(s) {
  await waitForFirebase();
  const {doc,setDoc,serverTimestamp} = window.__firebase;
  await setDoc(doc(window.__db,"students",s.id),{...s,createdAt:serverTimestamp()});
}
async function fbGetAttendance(studentId) {
  await waitForFirebase();
  const {collection,getDocs} = window.__firebase;
  const snap = await getDocs(collection(window.__db,"students",studentId,"records"));
  const r={};snap.docs.forEach(d=>{r[d.id]=d.data();});return r;
}
async function fbSaveAttendance(studentId, date, marks) {
  await waitForFirebase();
  const {doc,setDoc,serverTimestamp} = window.__firebase;
  await setDoc(doc(window.__db,"students",studentId,"records",date),{...marks,savedAt:serverTimestamp()},{merge:true});
}
async function fbSaveAssignment(a) {
  await waitForFirebase();
  const {collection,addDoc,serverTimestamp} = window.__firebase;
  const ref = await addDoc(collection(window.__db,"assignments"),{...a,createdAt:serverTimestamp()});
  return ref.id;
}
function fbSubscribeStudents(cb) {
  const go = async()=>{
    await waitForFirebase();
    const {collection,onSnapshot}=window.__firebase;
    return onSnapshot(collection(window.__db,"students"),snap=>{cb(snap.docs.map(d=>({...d.data(),id:d.id})));});
  };
  let unsub=()=>{};go().then(u=>{unsub=u;});return ()=>unsub();
}
function fbSubscribeAssignments(cb) {
  const go = async()=>{
    await waitForFirebase();
    const {collection,onSnapshot,query,orderBy}=window.__firebase;
    return onSnapshot(query(collection(window.__db,"assignments"),orderBy("due","asc")),snap=>{cb(snap.docs.map(d=>({...d.data(),id:d.id})));});
  };
  let unsub=()=>{};go().then(u=>{unsub=u;});return ()=>unsub();
}
function genToken(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let t="";for(let i=0;i<8;i++)t+=c[Math.floor(Math.random()*c.length)];return t;}
async function fbCreateQR(sessionIdx,dayName,date,mins=10){
  await waitForFirebase();
  const {doc,setDoc,serverTimestamp}=window.__firebase;
  const token=genToken();
  await setDoc(doc(window.__db,"qrTokens",token),{token,sessionIdx,dayName,date,expiresAt:new Date(Date.now()+mins*60000).toISOString(),scans:[],createdAt:serverTimestamp()});
  return token;
}
async function fbValidateQR(token,studentId){
  await waitForFirebase();
  const {doc,getDoc,updateDoc}=window.__firebase;
  const snap=await getDoc(doc(window.__db,"qrTokens",token));
  if(!snap.exists()) return{valid:false,reason:"Invalid QR code"};
  const d=snap.data();
  if(new Date(d.expiresAt)<new Date()) return{valid:false,reason:"QR code expired"};
  if(d.scans.includes(studentId)) return{valid:false,reason:"Already marked present"};
  await fbSaveAttendance(studentId,d.date,{[d.sessionIdx]:"P"});
  await updateDoc(doc(window.__db,"qrTokens",token),{scans:[...d.scans,studentId]});
  return{valid:true,session:SCHEDULE[d.dayName]?.[d.sessionIdx]?.subject,date:d.date};
}

function initials(n){return n.split(" ").slice(0,2).map(x=>x[0]).join("");}
function calcPct(records){
  let t=0,p=0;
  Object.values(records||{}).forEach(day=>{Object.entries(day).forEach(([k,v])=>{if(k==="savedAt")return;t++;if(v==="P"||v==="L")p++;});});
  return t===0?100:Math.round(p/t*100);
}
function daysUntil(d){return Math.ceil((new Date(d)-new Date())/(86400000));}
function dueDateLabel(d){
  if(d<0)return{label:`${Math.abs(d)}d overdue`,cls:"deadline-urgent"};
  if(d===0)return{label:"Due today!",cls:"deadline-urgent"};
  if(d===1)return{label:"Due tomorrow",cls:"deadline-urgent"};
  if(d<=3)return{label:`Due in ${d} days`,cls:"deadline-soon"};
  return{label:`Due in ${d} days`,cls:"deadline-ok"};
}
function generatePDF(student,records,assignments){
  try{
    const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210,mx=18,pct=calcPct(records);

function QRPage({students,role,currentStudentId,addToast}){
  const [selDay,setSelDay]=useState(TODAY_KEY);
  const [selIdx,setSelIdx]=useState(0);
  const [token,setToken]=useState(null);
  const [timeLeft,setTimeLeft]=useState(0);
  const [scans,setScans]=useState([]);
  const [fullscreen,setFullscreen]=useState(false);
  const [manualToken,setManualToken]=useState("");
  const [scanStatus,setScanStatus]=useState(null);
  const [generating,setGenerating]=useState(false);
  const timerRef=useRef();const pollRef=useRef();
  const DURATION=10*60;
  const sessions=SCHEDULE[selDay]||[];
  const generate=async()=>{
    setGenerating(true);
    try{
      const t=await fbCreateQR(selIdx,selDay,TODAY_DATE,10);
      setToken(t);setTimeLeft(DURATION);setScans([]);
      clearInterval(timerRef.current);
      timerRef.current=setInterval(()=>setTimeLeft(x=>{if(x<=1){clearInterval(timerRef.current);setToken(null);return 0;}return x-1;}),1000);
      clearInterval(pollRef.current);
      pollRef.current=setInterval(async()=>{
        await waitForFirebase();const {doc,getDoc}=window.__firebase;
        const snap=await getDoc(doc(window.__db,"qrTokens",t));
        if(snap.exists()){const s=snap.data().scans||[];setScans(s.map(id=>{const st=students.find(x=>x.id===id);return st?st.name.split(" ")[0]:id;}));}
      },3000);
      addToast("QR generated — 10 min window","🔲");
    }catch(e){addToast("Failed: "+e.message,"❌");}
    setGenerating(false);
  };
  const validate=async()=>{
    if(!manualToken.trim()||!currentStudentId){addToast("Enter a code","⚠️");return;}
    setScanStatus("loading");
    const r=await fbValidateQR(manualToken.trim().toUpperCase(),currentStudentId);
    setScanStatus(r.valid?"success":"error");
    addToast(r.valid?`✅ Marked present for ${r.session}`:`❌ ${r.reason}`,r.valid?"✅":"❌");
  };
  useEffect(()=>()=>{clearInterval(timerRef.current);clearInterval(pollRef.current);},[]);
  const mins=Math.floor(timeLeft/60),secs=timeLeft%60,prog=(timeLeft/DURATION)*100;

  if(role==="student") return(
    <div style={{padding:"24px 28px"}}>
      <h2 className="page-title" style={{marginBottom:4}}>Scan QR</h2>
      <p className="page-sub" style={{marginBottom:24}}>Enter the 8-character code from your mentor's screen</p>
      <div style={{maxWidth:380}}>
        <div className="table-card" style={{padding:24}}>
          {scanStatus==="success"&&<div style={{background:"var(--greenbg)",border:"1px solid rgba(34,197,94,.2)",borderRadius:10,padding:16,marginBottom:16,textAlign:"center"}}><div style={{fontSize:32,marginBottom:6}}>✅</div><div style={{color:"var(--green)",fontWeight:600}}>Attendance marked!</div></div>}
          {scanStatus==="error"&&<div style={{background:"var(--redbg)",border:"1px solid rgba(239,68,68,.2)",borderRadius:10,padding:12,marginBottom:16}}><div style={{color:"var(--red)",fontSize:13}}>Invalid or expired code</div></div>}
          <div className="form-group">
            <label className="form-label">Session code</label>
            <input className="form-input" placeholder="K7X2M9QR" maxLength={8} value={manualToken} onChange={e=>setManualToken(e.target.value.toUpperCase())}
              style={{fontSize:20,fontWeight:700,letterSpacing:"0.2em",textAlign:"center"}} onKeyDown={e=>e.key==="Enter"&&validate()}/>
          </div>
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={validate} disabled={scanStatus==="loading"}>
            {scanStatus==="loading"?"Checking…":"Mark present"}
          </button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{padding:"24px 28px"}}>
      <h2 className="page-title" style={{marginBottom:4}}>QR attendance</h2>
      <p className="page-sub" style={{marginBottom:24}}>Generate a QR — students enter the code to mark present</p>
      <div className="table-card" style={{marginBottom:20}}>
        <div className="table-head"><div className="table-title">Select session</div></div>
        <div style={{padding:"12px 18px"}}>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {DAYS.map(d=><button key={d} onClick={()=>{setSelDay(d);setSelIdx(0);}} style={{padding:"6px 14px",borderRadius:8,border:"1px solid",borderColor:selDay===d?"var(--accent)":"var(--border)",background:selDay===d?"var(--accentbg)":"var(--surface2)",color:selDay===d?"var(--accent)":"var(--text2)",fontSize:13,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>{d}</button>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:8,marginBottom:14}}>
            {sessions.map((s,i)=><div key={i} onClick={()=>setSelIdx(i)} style={{padding:"10px 14px",borderRadius:10,cursor:"pointer",border:`1px solid ${selIdx===i?"var(--accent)":"var(--border)"}`,background:selIdx===i?"var(--accentbg)":"var(--surface2)"}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:3}}>{s.time}</div>
              <div style={{fontSize:12,fontWeight:500,color:selIdx===i?"var(--accent)":"var(--text)"}}>{s.subject.length>30?s.subject.slice(0,28)+"…":s.subject}</div>
            </div>)}
          </div>
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={generate} disabled={generating}>
            {generating?"Generating…":token?"↻ New QR (reset 10 min)":"Generate QR code"}
          </button>
        </div>
      </div>
      {token&&(
        <div className="table-card">
          <div className="table-head">
            <div><div className="table-title">{sessions[selIdx]?.subject}</div><div className="table-sub">{selDay} · {TODAY_DATE}</div></div>
            <span className="badge badge-green">{scans.length} scanned</span>
          </div>
          <div style={{padding:20,textAlign:"center"}}>
            <div className="qr-container" onClick={()=>setFullscreen(true)} style={{marginBottom:12}}>
              <svg width={180} height={180} viewBox="0 0 180 180">
                <rect width={180} height={180} fill="white"/>
                <text x="90" y="70" textAnchor="middle" fontSize="13" fontFamily="monospace" fill="#555">Session code</text>
                <text x="90" y="108" textAnchor="middle" fontSize="36" fontFamily="monospace" fontWeight="900" fill="#0d0f14" letterSpacing="4">{token.slice(0,4)}</text>
                <text x="90" y="140" textAnchor="middle" fontSize="36" fontFamily="monospace" fontWeight="900" fill="#606AF6" letterSpacing="4">{token.slice(4)}</text>
                <rect x="8" y="8" width="28" height="28" rx="3" fill="none" stroke="#0d0f14" strokeWidth="2.5"/><rect x="13" y="13" width="18" height="18" rx="1" fill="#0d0f14"/>
                <rect x="144" y="8" width="28" height="28" rx="3" fill="none" stroke="#0d0f14" strokeWidth="2.5"/><rect x="149" y="13" width="18" height="18" rx="1" fill="#0d0f14"/>
                <rect x="8" y="144" width="28" height="28" rx="3" fill="none" stroke="#0d0f14" strokeWidth="2.5"/><rect x="13" y="149" width="18" height="18" rx="1" fill="#0d0f14"/>
              </svg>
            </div>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:16}}>Students go to Scan QR page and enter this code · Click to fullscreen</div>
            <div style={{marginBottom:8,display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text2)"}}>
              <span>Time remaining</span>
              <span style={{fontWeight:600,color:timeLeft<60?"var(--red)":timeLeft<180?"var(--amber)":"var(--green)"}}>{mins}:{String(secs).padStart(2,"0")}</span>
            </div>
            <div style={{background:"var(--surface3)",borderRadius:99,height:6,overflow:"hidden",marginBottom:16}}>
              <div style={{width:`${prog}%`,height:"100%",borderRadius:99,background:timeLeft<60?"var(--red)":timeLeft<180?"var(--amber)":"var(--green)",transition:"width 1s linear"}}/>
            </div>
            {scans.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>{scans.map((n,i)=><span key={i} className="badge badge-green">✓ {n}</span>)}</div>}
          </div>
        </div>
      )}
      {fullscreen&&token&&(
        <div className="qr-fullscreen" onClick={()=>setFullscreen(false)}>
          <div style={{color:"#333",fontSize:16,fontWeight:600,marginBottom:20}}>{sessions[selIdx]?.subject} · Enter this code in the app</div>
          <div style={{background:"#f8f8ff",border:"3px solid #606AF6",borderRadius:20,padding:"32px 48px",marginBottom:16}}>
            <div style={{fontSize:80,fontWeight:900,fontFamily:"monospace",color:"#0d0f14",letterSpacing:"0.15em",lineHeight:1}}>{token.slice(0,4)}</div>
            <div style={{fontSize:80,fontWeight:900,fontFamily:"monospace",color:"#606AF6",letterSpacing:"0.15em",lineHeight:1}}>{token.slice(4)}</div>
          </div>
          <div style={{color:timeLeft<60?"#ef4444":"#f59e0b",fontSize:24,fontWeight:700}}>{mins}:{String(secs).padStart(2,"0")} remaining</div>
          <div style={{color:"#999",fontSize:14,marginTop:8}}>Tap anywhere to close</div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [role,setRole]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [page,setPage]=useState("dashboard");
  const [students,setStudents]=useState([]);
  const [attendance,setAttendance]=useState({});
  const [assignments,setAssignments]=useState([]);
  const [dataLoading,setDataLoading]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);
  const [todayMarks,setTodayMarks]=useState({});
  const [activeStudentId,setActiveStudentId]=useState(null);
  const [addStudentForm,setAddStudentForm]=useState({name:"",email:"",parent:"",squad:"Squad 92"});
  const [addAssignForm,setAddAssignForm]=useState({title:"",subject:SCHEDULE.Mon[0].subject,due:"",type:"Assignment"});
  const [loginLoading,setLoginLoading]=useState(false);

  const addToast=useCallback((msg,icon="✓")=>{
    const id=Date.now();setToasts(t=>[...t,{id,msg,icon}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);

  useEffect(()=>{
    const go=async()=>{
      await waitForFirebase();
      const {onAuthStateChanged}=window.__firebase;
      return onAuthStateChanged(window.__auth,u=>{
        if(u){setUser(u);setRole(MENTOR_EMAILS.includes(u.email?.toLowerCase())?"mentor":"student");}
        else{setUser(null);setRole(null);}
        setAuthLoading(false);
      });
    };
    let unsub=()=>{};go().then(u=>{unsub=u;});return()=>unsub();
  },[]);

  useEffect(()=>{
    if(!user)return;
    setDataLoading(true);
    const unsubS=fbSubscribeStudents(async ns=>{
      setStudents(ns);
      const a={};await Promise.all(ns.map(async s=>{a[s.id]=await fbGetAttendance(s.id);}));
      setAttendance(a);setDataLoading(false);
    });
    const unsubA=fbSubscribeAssignments(setAssignments);
    return()=>{unsubS();unsubA();};
  },[user]);

  const handleLogin=async()=>{
    setLoginLoading(true);
    try{
      await waitForFirebase();
      const {signInWithRedirect}=window.__firebase;
      await signInWithRedirect(window.__auth,window.__provider);
      // page will redirect — loading state stays
    }catch(e){addToast("Sign in failed: "+e.message,"❌");setLoginLoading(false);}
  };
  const handleSignOut=async()=>{

  };

    catch(e){addToast("Save failed: "+e.message,"❌");}

    catch(e){addToast("Failed: "+e.message,"❌");}

    const {title,subject,due,type}=addAssignForm;
    if(!title||!due){addToast("Fill title and due date","⚠️");return;}

    catch(e){addToast("Failed: "+e.message,"❌");}
  };

  const Dashboard=()=>(
    <>
      <div className="page-header">

            <div style={{fontSize:40,marginBottom:12}}>👥</div>

        </div>
        <div className="modal-footer"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-primary" onClick={handleAddStudent}>Add to Firebase</button></div>
      </div>
    </div>
  );

  const AddAssignModal=()=>{
    const subs=[...new Set(Object.values(SCHEDULE).flat().map(s=>s.subject))];
    return<div className="modal-overlay" onClick={()=>setModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><div className="modal-title">Add assignment</div><button className="close-btn" onClick={()=>setModal(null)}>×</button></div>
        <div className="modal-body">
          <div className="form-group"><label className="form-label">Title</label><input className="form-input" placeholder="DSA Lab – Sorting" value={addAssignForm.title} onChange={e=>setAddAssignForm(x=>({...x,title:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Subject</label>
            <select className="form-input form-select" value={addAssignForm.subject} onChange={e=>setAddAssignForm(x=>({...x,subject:e.target.value}))}>
              {subs.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="form-group"><label className="form-label">Type</label>
            <select className="form-input form-select" value={addAssignForm.type} onChange={e=>setAddAssignForm(x=>({...x,type:e.target.value}))}>
              {["Assignment","Lab","Project","Quiz","Document","Presentation"].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="form-group"><label className="form-label">Due date</label><input className="form-input" type="date" value={addAssignForm.due} onChange={e=>setAddAssignForm(x=>({...x,due:e.target.value}))}/></div>
        </div>
        <div className="modal-footer"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-primary" onClick={handleAddAssignment}>Save to Firebase</button></div>
      </div>
    </div>;
  };

  const mentorNav=[{key:"dashboard",label:"Dashboard",icon:"dashboard"},{key:"mark",label:"Mark attendance",icon:"mark"},{key:"students",label:"Students",icon:"students"},{key:"alerts",label:"Alerts",icon:"alerts",badge:dangerStudents.length},{key:"assignments",label:"Assignments",icon:"assign",badge:assignments.filter(a=>daysUntil(a.due)<=2&&daysUntil(a.due)>=0).length},{key:"reports",label:"PDF Reports",icon:"report"},{key:"qr",label:"QR Attendance",icon:"qr"}];
  const studentNav=[{key:"dashboard",label:"My overview",icon:"dashboard"},{key:"assignments",label:"Deadlines",icon:"assign"},{key:"qr",label:"Scan QR",icon:"qr"}];
  const nav=role==="mentor"?mentorNav:studentNav;

  const renderPage=()=>{
    if(page==="dashboard")return<Dashboard/>;if(page==="mark")return<MarkAttendance/>;
    if(page==="students")return<StudentsPage/>;if(page==="studentDetail")return<StudentDetail/>;
    if(page==="alerts")return<AlertsPage/>;if(page==="assignments")return<AssignmentsPage/>;
    if(page==="reports")return<ReportsPage/>;
    if(page==="qr")return<QRPage students={students} role={role} currentStudentId={myStudent?.id} addToast={addToast}/>;
    return<Dashboard/>;
  };

  if(authLoading)return<div className="loading-screen"><div className="loading-spinner"/><div style={{color:"var(--text2)",fontSize:13}}>Loading…</div></div>;
  if(!user)return<LoginScreen onLogin={handleLogin} loading={loginLoading}/>;

  return(
    <div id="app" style={{display:"flex",minHeight:"100vh"}}>
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-badge"><div className="logo-icon">K</div><div><div className="logo-text">Kalvium</div></div></div>
          <div className="logo-sub">Attendance · Squad 92</div>
        </div>
        <div className="nav-section">
          <div className="nav-label">Navigation</div>
          {nav.map(item=>(
            <div key={item.key} className={`nav-item ${page===item.key||page==="studentDetail"&&item.key==="students"?"active":""}`} onClick={()=>setPage(item.key)}>
              <span className="nav-icon"><Icon name={item.icon} size={15}/></span>
              <span>{item.label}</span>
              {item.badge>0&&<span className="nav-badge">{item.badge}</span>}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="role-pill">
            <div className="role-avatar" style={{fontSize:10,background:role==="mentor"?"var(--accent)":"var(--green)"}}>{user.displayName?.split(" ").slice(0,2).map(n=>n[0]).join("")||"?"}</div>
            <div><div className="role-name">{user.displayName?.split(" ")[0]}</div><div className="role-tag">{role==="mentor"?"Mentor · Admin":"Student"}</div></div>
            <button className="role-switch" onClick={handleSignOut} title="Sign out"><Icon name="logout" size={12}/></button>
          </div>
        </div>
      </div>
      <div className="main">{renderPage()}</div>
      {modal==="addStudent"&&<AddStudentModal/>}
      {modal==="addAssign"&&<AddAssignModal/>}
      <Toasts toasts={toasts}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
